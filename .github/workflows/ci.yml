name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm run lint

      - name: Domain boundaries
        run: pnpm run lint:boundaries

      - name: Typecheck
        run: pnpm run typecheck

      - name: Test
        run: pnpm run test
        env:
          # Some test files transitively import @/db/client which validates
          # DATABASE_URL on import. The query layer is mocked at the test
          # boundary, so this placeholder is never actually opened.
          DATABASE_URL: postgresql://placeholder:placeholder@localhost:5432/placeholder

      - name: Build
        run: pnpm run build
        env:
          # Build needs these to instantiate the DB client and Clerk provider.
          # Real values aren't reached at build time — these are placeholders so
          # the env-presence checks pass. Real values come from each deploy env.
          DATABASE_URL: postgresql://placeholder:placeholder@localhost:5432/placeholder
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder
          SUPABASE_SERVICE_ROLE_KEY: placeholder
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: pk_test_placeholder
          CLERK_SECRET_KEY: sk_test_placeholder
